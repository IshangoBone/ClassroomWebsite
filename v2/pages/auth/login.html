<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTheCurrent V2 | Login</title>
    <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body>
    <main>
        <p class="eyebrow">Authentication</p>
        <h1>Log In</h1>
        <p class="intro">
            This is the starter login shell for Version 2. Supabase auth will plug into this page next.
        </p>

        <section aria-labelledby="login-form-heading">
            <h2 id="login-form-heading">Account Access</h2>
            <form class="auth-form">
                <label class="form-field">
                    <span>Email</span>
                    <input type="email" name="email" placeholder="teacher@school.org" />
                </label>

                <label class="form-field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Enter your password" />
                </label>

                <button type="button" class="primary-button">Log In</button>
            </form>
        </section>
    </main>
</body>

</html>
