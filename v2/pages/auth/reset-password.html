<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainKernl V2 | Reset Password</title>
    <link rel="stylesheet" href="../../styles/main.css?v=20260708-topnav-nowrap" />
</head>

<body>
    <main class="auth-layout auth-layout--single">
        <section class="auth-card auth-card--single" aria-labelledby="reset-password-heading">
            <div class="auth-card-header">
                <p class="eyebrow">BrainKernl V2</p>
                <h1 id="reset-password-heading" class="auth-card-title">Reset your password</h1>
                <p class="auth-card-copy">
                    Choose a new password for your account. After it saves, you can return to the login page.
                </p>
            </div>

            <form class="auth-form" data-reset-password-form>
                <label class="form-field">
                    <span>New password</span>
                    <input type="password" name="password" placeholder="Create a new password" minlength="6" required />
                </label>

                <label class="form-field">
                    <span>Confirm password</span>
                    <input type="password" name="confirmPassword" placeholder="Re-enter the new password" minlength="6"
                        required />
                </label>

                <button type="submit" class="primary-button">Save new password</button>
            </form>

            <p class="auth-status" data-reset-password-status aria-live="polite"></p>

            <p class="auth-secondary-copy">
                Remembered your password?
                <a href="./login.html">Return to login</a>
            </p>
        </section>
    </main>

    <script type="module" src="../../scripts/auth/reset-password.js?v=20260607-password-reset"></script>
</body>

</html>
