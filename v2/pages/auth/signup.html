<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTheCurrent V2 | Sign Up</title>
    <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body>
    <main>
        <p class="eyebrow">Authentication</p>
        <h1>Create Your Account</h1>
        <p class="intro">
            This page will become the main signup entry point for students, teachers, and admins.
        </p>

        <section aria-labelledby="signup-form-heading">
            <h2 id="signup-form-heading">New Account</h2>
            <form class="auth-form">
                <label class="form-field">
                    <span>Full name</span>
                    <input type="text" name="full-name" placeholder="Jake Roos-Williams" />
                </label>

                <label class="form-field">
                    <span>Email</span>
                    <input type="email" name="email" placeholder="name@example.com" />
                </label>

                <label class="form-field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Create a password" />
                </label>

                <button type="button" class="primary-button">Create Account</button>
            </form>
        </section>
    </main>
</body>

</html>
