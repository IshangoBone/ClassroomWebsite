<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTheCurrent V2 | Classroom Roster</title>
    <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body>
    <main class="management-layout">
        <a class="back-link" href="../dashboard/index.html">Back to dashboard</a>

        <header class="management-header">
            <p class="eyebrow">Classroom Roster</p>
            <h1 data-roster-heading>Loading roster...</h1>
            <p class="intro" data-roster-context>Preparing enrolled students.</p>
        </header>

        <p class="auth-status management-status" data-roster-status aria-live="polite"></p>

        <section class="management-section" data-roster-shell hidden>
            <div class="section-header section-header--actions">
                <div>
                    <h2>Students</h2>
                    <p class="section-copy">Read-only roster for this classroom. Removal, filters, and progress drill-downs come next.</p>
                </div>
                <a class="secondary-button" href="../dashboard/index.html" data-manage-classrooms-link>Manage classrooms</a>
            </div>

            <div class="roster-summary-grid" data-roster-summary>
                <p class="empty-state">Loading roster summary...</p>
            </div>

            <div data-roster-list>
                <p class="empty-state">Loading enrolled students...</p>
            </div>
        </section>
    </main>

    <script type="module" src="../../scripts/classrooms/roster.js?v=20260531-roster-view"></script>
</body>

</html>
