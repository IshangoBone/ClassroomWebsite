<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainKernl | Settings</title>
    <link rel="stylesheet" href="../../styles/main.css?v=20260708-profile-editor" />
</head>

<body>
    <main class="settings-page">
        <header class="management-header">
            <div>
                <p class="eyebrow">Settings</p>
                <h1>Account settings</h1>
                <p class="intro">Only the essentials for managing your BrainKernl account.</p>
            </div>
        </header>

        <p class="auth-status management-status" data-settings-status aria-live="polite">Loading settings...</p>

        <section class="dashboard-section dashboard-section--panel settings-panel" aria-labelledby="account-heading">
            <div class="section-header section-header--actions">
                <div>
                    <h2 id="account-heading">Account</h2>
                    <p class="section-copy">Basic account details and profile access.</p>
                </div>
                <button class="secondary-button" type="button" data-edit-profile-button>Edit profile</button>
            </div>
            <dl class="profile-detail-list" data-settings-details></dl>
            <form class="settings-profile-form" data-settings-profile-form hidden>
                <div class="settings-profile-editor">
                    <div class="settings-profile-photo-card">
                        <div class="settings-profile-avatar-preview" data-settings-avatar-preview></div>
                        <label class="secondary-button settings-profile-upload-button">
                            Change photo
                            <input type="file" name="profile-photo" accept="image/png,image/jpeg,image/webp,image/gif" />
                        </label>
                        <p class="form-hint">PNG, JPEG, WebP, or GIF. Max 10 MB.</p>
                    </div>
                    <div class="settings-profile-fields">
                        <label class="form-field">
                            <span>First name</span>
                            <input type="text" name="legal-first-name" autocomplete="given-name" required />
                        </label>
                        <label class="form-field">
                            <span>Last name</span>
                            <input type="text" name="legal-last-name" autocomplete="family-name" required />
                        </label>
                        <label class="form-field form-field--wide">
                            <span>Username</span>
                            <input type="text" name="username" autocomplete="username" minlength="3" maxlength="40"
                                pattern="[A-Za-z0-9]+" title="Use only letters and numbers." required />
                            <small class="form-hint">Use 3–40 letters and numbers. Usernames must be unique.</small>
                        </label>
                    </div>
                </div>
                <div class="profile-photo-preview" data-settings-photo-preview hidden>
                    <img alt="" data-settings-photo-preview-image />
                    <span data-settings-photo-preview-name></span>
                </div>
                <div class="settings-actions">
                    <button type="submit" class="primary-button">Save profile</button>
                    <button type="button" class="secondary-button" data-cancel-profile-edit-button>Cancel</button>
                </div>
            </form>
        </section>

        <section class="dashboard-section dashboard-section--panel settings-panel" aria-labelledby="security-heading">
            <div class="section-header">
                <div>
                    <h2 id="security-heading">Security</h2>
                    <p class="section-copy">Send a password reset link to your account email.</p>
                </div>
            </div>
            <div class="settings-actions">
                <button type="button" class="secondary-button" data-password-reset-button>Send password reset email</button>
                <button type="button" class="secondary-button destructive-button" data-settings-logout-button>Log out</button>
            </div>
        </section>
    </main>

    <script type="module" src="../../scripts/settings/index.js?v=20260723-quiet-username-filter"></script>
</body>

</html>
