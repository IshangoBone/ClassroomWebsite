<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTheCurrent V2 | Admin Detail</title>
    <link rel="stylesheet" href="../../styles/main.css?v=20260609-mvp-topnav" />
</head>

<body>
    <main class="management-layout admin-layout">
        <a class="back-link" href="./index.html">Back to admin dashboard</a>

        <header class="management-header">
            <p class="eyebrow" data-admin-detail-type>Admin Detail</p>
            <h1 data-admin-detail-title>Loading record...</h1>
            <p class="intro" data-admin-detail-copy>Preparing admin record details.</p>
        </header>

        <p class="auth-status management-status" data-admin-detail-status aria-live="polite"></p>

        <section class="management-section" data-admin-detail-shell hidden>
            <div class="section-header section-header--actions">
                <div>
                    <h2>Record summary</h2>
                    <p class="section-copy">Read-only admin details for this platform record.</p>
                </div>
                <a class="secondary-button" data-admin-detail-activity href="../activity/index.html">View activity</a>
            </div>

            <div class="dashboard-summary dashboard-summary--compact" data-admin-detail-summary>
                <p class="empty-state">Loading summary...</p>
            </div>

            <div class="admin-detail-grid" data-admin-detail-grid>
                <p class="empty-state">Loading details...</p>
            </div>
        </section>
    </main>

    <script type="module" src="../../scripts/admin/detail.js?v=20260602-route-guards"></script>
</body>

</html>
