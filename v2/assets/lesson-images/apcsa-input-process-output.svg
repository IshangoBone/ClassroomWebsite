<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Input process output model</title>
  <desc id="desc">A classroom diagram showing user input, program processing, and output.</desc>
  <rect width="960" height="540" fill="#f8fbff"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17375e">Input, Process, Output</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="18" fill="#4f6683">Interactive programs ask for data, store it in variables, then calculate or respond.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="85" y="205" width="220" height="145" rx="22" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="195" y="260" font-size="30" font-weight="700" fill="#17375e">Input</text>
    <text x="195" y="302" font-size="17" fill="#526b8a">Scanner reads user data</text>
    <rect x="370" y="205" width="220" height="145" rx="22" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="480" y="260" font-size="30" font-weight="700" fill="#17375e">Process</text>
    <text x="480" y="302" font-size="17" fill="#526b8a">Variables and expressions</text>
    <rect x="655" y="205" width="220" height="145" rx="22" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="765" y="260" font-size="30" font-weight="700" fill="#17375e">Output</text>
    <text x="765" y="302" font-size="17" fill="#526b8a">Printed result or message</text>
  </g>
  <g stroke="#356bbb" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M315 277h45"/>
    <path d="m350 263 16 14-16 14"/>
    <path d="M600 277h45"/>
    <path d="m635 263 16 14-16 14"/>
  </g>
</svg>
