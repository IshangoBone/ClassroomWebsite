<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Java data types map</title>
  <desc id="desc">A classroom diagram organizing common Java data types and example values.</desc>
  <rect width="960" height="540" fill="#f8fbff"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17375e">Choosing a Java Data Type</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="18" fill="#4f6683">The type tells Java what kind of value is stored and what operations make sense.</text>
  <g font-family="Arial, sans-serif" fill="#17375e">
    <rect x="90" y="175" width="230" height="245" rx="20" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="125" y="220" font-size="26" font-weight="700">Whole numbers</text>
    <text x="125" y="265" font-size="44" font-weight="700">int</text>
    <text x="125" y="310" font-size="18" fill="#526b8a">Examples: 0, 7, -42</text>
    <text x="125" y="344" font-size="18" fill="#526b8a">Use for counts, scores, ages</text>
    <rect x="365" y="175" width="230" height="245" rx="20" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="400" y="220" font-size="26" font-weight="700">Decimals</text>
    <text x="400" y="265" font-size="44" font-weight="700">double</text>
    <text x="400" y="310" font-size="18" fill="#526b8a">Examples: 3.14, -0.5</text>
    <text x="400" y="344" font-size="18" fill="#526b8a">Use for measurements, averages</text>
    <rect x="640" y="175" width="230" height="245" rx="20" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="675" y="220" font-size="26" font-weight="700">Logic and text</text>
    <text x="675" y="265" font-size="30" font-weight="700">boolean, char, String</text>
    <text x="675" y="310" font-size="18" fill="#526b8a">true / false</text>
    <text x="675" y="344" font-size="18" fill="#526b8a">'A' and "Hello"</text>
  </g>
</svg>
