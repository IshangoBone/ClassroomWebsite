<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm to Java program flow</title>
  <desc id="desc">A classroom diagram showing how an idea becomes an algorithm, source code, compiler feedback, and a running program.</desc>
  <rect width="960" height="540" fill="#f6f9fd"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17375e">From Algorithm to Running Program</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="18" fill="#4f6683">Precise steps become code. The compiler checks the code before the computer runs it.</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#17375e" text-anchor="middle">
    <rect x="70" y="185" width="165" height="110" rx="18" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="152" y="232" font-weight="700">Problem</text>
    <text x="152" y="262" font-size="15" fill="#526b8a">What should happen?</text>
    <rect x="285" y="185" width="165" height="110" rx="18" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="368" y="232" font-weight="700">Algorithm</text>
    <text x="368" y="262" font-size="15" fill="#526b8a">Ordered steps</text>
    <rect x="500" y="185" width="165" height="110" rx="18" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="582" y="232" font-weight="700">Java Code</text>
    <text x="582" y="262" font-size="15" fill="#526b8a">Source file</text>
    <rect x="715" y="185" width="165" height="110" rx="18" fill="#ffffff" stroke="#d6e2f2" stroke-width="3"/>
    <text x="798" y="232" font-weight="700">Compiler</text>
    <text x="798" y="262" font-size="15" fill="#526b8a">Checks syntax</text>
  </g>
  <g stroke="#356bbb" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M240 240h36"/>
    <path d="m268 226 16 14-16 14"/>
    <path d="M455 240h36"/>
    <path d="m483 226 16 14-16 14"/>
    <path d="M670 240h36"/>
    <path d="m698 226 16 14-16 14"/>
  </g>
  <rect x="180" y="370" width="600" height="74" rx="16" fill="#eaf1fb" stroke="#cddcf0" stroke-width="2"/>
  <text x="480" y="402" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#17375e" text-anchor="middle">Debugging loop</text>
  <text x="480" y="430" font-family="Arial, sans-serif" font-size="16" fill="#526b8a" text-anchor="middle">If the compiler or test result catches an error, revise the algorithm or code and try again.</text>
</svg>
